tagline: "The AgntUX orchestrator. Triages action items and queries your knowledge store."
description: |
  Installs first; everything else hangs off it. Maintains your `<agntux project root>/`
  knowledge store, triages action items per your `user.md` preferences,
  and keeps `_index.md` files in sync as ingest plugins write new data.
categories:
  - meta
keywords:
  - orchestrator
  - personalization
  - knowledge-store
  - triage
available_on:
  - trial
  - pro
  - team
  - enterprise
supported_prompts:
  - prompt: "/agntux-core:onboard"
    purpose: "First-run interview and schema bootstrap. Creates <agntux project root>/user.md and the tenant schema."
  - prompt: "/agntux-core:profile"
    purpose: "Edit your AgntUX profile — preferences, glossary, identity, sources, action-worthy/noise rules."
  - prompt: "/agntux-core:teach"
    purpose: "Capture per-plugin instructions. With a {plugin-slug} runs the install-time / on-demand teach interview."
  - prompt: "/agntux-core:triage"
    purpose: "Daily action-item digest. Recommended scheduled task at Daily 08:00."
  - prompt: "/agntux-core:schema"
    purpose: "Review or edit the tenant schema. Bare form re-walks; `review {slug}` re-reviews a contract; `edit` drives a user-initiated change."
  - prompt: "/agntux-core:sync"
    purpose: "Cross-plugin sync alias. `/agntux-core:sync {plugin-slug}` re-dispatches to the per-plugin sync command."
  - prompt: "/agntux-core:ask"
    purpose: "Catch-all for natural-language queries — entity lookups, time-window questions, topic queries, meeting prep, status edits."
  - prompt: "/agntux-core:feedback-review"
    purpose: "Daily pattern detection over recently-resolved action items. Recommended scheduled task at Daily 16:00."
ui_components:
  - name: "triage"
    title: "Action item triage"
    purpose: "The primary inline UI. Shows priority-sorted open action items with snooze / dismiss / done buttons."
  - name: "entity-browser"
    title: "Entity browser"
    purpose: "Browse and pivot between people, companies, projects, and topics in your knowledge store."
screenshot_order:
  - "01-chat.png"
  - "02-action-detail.png"
  - "03-personalization.png"
support:
  url: "https://github.com/agntux/plugins/issues?q=label%3Aagntux-core"
  email: "support@agntux.ai"
requires_plugins: []
developer:
  name: "AgntUX"
  url: "https://agntux.ai"
  github_handle: "agntux"
