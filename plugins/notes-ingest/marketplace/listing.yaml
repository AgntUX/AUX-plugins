tagline: "Turn your local Markdown notes into an AgntUX knowledge store."
description: |
  Watches a local notes directory (Obsidian vault, Markdown folder, plain
  text files) and extracts people, companies, projects, and topics as
  AgntUX entities. Action items surface deadlines, follow-ups, and open
  questions so nothing falls through the cracks.
categories:
  - productivity
  - notes-knowledge
keywords:
  - notes
  - markdown
  - local-files
  - knowledge-base
  - obsidian
available_on:
  - trial
  - pro
  - team
  - enterprise
data_ingested:
  - "Markdown (.md) and plain-text (.txt) files in the configured notes directory"
  - "People mentioned by name (meeting notes, introductions, action items)"
  - "Companies and organisations referenced in notes"
  - "Projects and codenames from the user's glossary"
  - "Topics, concepts, and recurring themes"
supported_prompts:
  - prompt: "/notes-ingest:sync"
    purpose: "Run a notes-ingest pass now (manual) or on schedule. Recommended scheduled task at Daily 09:00."
support:
  url: "https://github.com/agntux/plugins/issues?q=label%3Anotes-ingest"
  email: "support@agntux.ai"
requires_plugins:
  - agntux-core
requires_source_mcp:
  source: npm
  package_name: "@modelcontextprotocol/server-filesystem"
  install_url: "https://www.npmjs.com/package/@modelcontextprotocol/server-filesystem"
  display_name: "Filesystem MCP"
developer:
  name: "AgntUX"
  url: "https://agntux.ai"
  github_handle: "agntux"
proposed_schema:
  entity_subtypes:
    - subtype: person
      description: "Individuals named or mentioned in notes (meeting attendees, action-item owners, references)."
      required_frontmatter:
        - id
        - type
        - schema_version
        - subtype
        - aliases
        - sources
        - created_at
        - updated_at
        - last_active
        - deleted_upstream
    - subtype: company
      description: "Organizations referenced in notes — customers, vendors, partners."
      required_frontmatter:
        - id
        - type
        - schema_version
        - subtype
        - aliases
        - sources
        - created_at
        - updated_at
        - last_active
        - deleted_upstream
    - subtype: project
      description: "Named workstreams or codenames (often resolved via user.md → # Glossary)."
      required_frontmatter:
        - id
        - type
        - schema_version
        - subtype
        - aliases
        - sources
        - created_at
        - updated_at
        - last_active
        - deleted_upstream
    - subtype: topic
      description: "Recurring themes, products, contracts, or research areas surfaced in notes."
      required_frontmatter:
        - id
        - type
        - schema_version
        - subtype
        - aliases
        - sources
        - created_at
        - updated_at
        - last_active
        - deleted_upstream
  action_classes:
    - class: knowledge-update
      description: "An informational signal extracted from a note (decision, fact, status update)."
    - class: deadline
      description: "A note carrying an explicit due date."
    - class: response-needed
      description: "A note flagging an open question or pending follow-up."
    - class: other
      description: "Escape hatch for items that don't fit the above; requires reason_detail."
  cursor_semantics: "Filesystem mtime in milliseconds (epoch); start-of-run timestamp advances the cursor to avoid races with files modified during the run."
  source_id_format: "Absolute file path under the configured notes directory."
