name: Regenerate indexes

on:
  push:
    branches:
      - main
    paths:
      - "plugins/**"
      - "scripts/regenerate-marketplace-json.ts"
      - "scripts/regenerate-aggregate-index.ts"
      - "lib/marketplace-schema.ts"

jobs:
  regenerate:
    name: Regenerate marketplace.json + index.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # actions/checkout v4.2.2
        with:
          # Fetch the full history so we can push back to main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        # actions/setup-node v4.1.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate .claude-plugin/marketplace.json
        run: npx tsx scripts/regenerate-marketplace-json.ts

      - name: Regenerate marketplace/index.json
        run: npx tsx scripts/regenerate-aggregate-index.ts

      - name: Commit regenerated indexes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json marketplace/index.json
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No index changes to commit."
          else
            git commit -m "chore: regenerate marketplace indexes [skip ci]"
            git push origin main
          fi
