name: Version check

on:
  pull_request:
    paths:
      - "plugins/**"

jobs:
  version-check:
    name: plugin.json version matches CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # actions/checkout v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        # actions/setup-node v4.1.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify version / CHANGELOG alignment
        run: npx tsx scripts/verify-version-changelog.ts
