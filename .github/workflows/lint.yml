name: Lint marketplace metadata

on:
  push:
    paths:
      - "plugins/**"
      - "canonical/**"
      - "scripts/lint-marketplace-metadata.ts"
      - "lib/marketplace-schema.ts"
  pull_request:
    paths:
      - "plugins/**"
      - "canonical/**"
      - "scripts/lint-marketplace-metadata.ts"
      - "lib/marketplace-schema.ts"
  workflow_call:

jobs:
  lint:
    name: Lint + version-changelog check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # actions/checkout v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        # actions/setup-node v4.1.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run marketplace metadata linter
        run: npm run lint:marketplace

      - name: Run version-changelog check
        run: npx tsx scripts/verify-version-changelog.ts
